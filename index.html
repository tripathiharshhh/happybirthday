<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday ❤️</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Floating Clouds -->

    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>

    <div class="card" style="margin-top:10vh; max-width:520px; text-align:center;">

        <h1 style="font-size:58px;">Happy Birthday ❤️</h1>

        <p class="subtitle">

            Before you continue...

        </p>

        <p style="margin-bottom:25px;">

            <strong>Hint:</strong><br>
            The password is someone close to your heart.

        </p>

        <input
            id="password"
            type="password"
            placeholder="Enter Password"
            style="
            width:100%;
            padding:16px;
            border:none;
            border-radius:14px;
            font-size:16px;
            margin-bottom:20px;
            outline:none;
            ">

        <button id="unlockBtn">

            Open My Gift ❤️

        </button>

        <p id="error" style="margin-top:20px;color:#d64d4d;"></p>

    </div>

    <script src="script.js"></script>

</body>

</html>
